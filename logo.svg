<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="50%" style="stop-color:#f0c970"/>
      <stop offset="100%" style="stop-color:#c9953c"/>
    </linearGradient>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b87333"/>
      <stop offset="100%" style="stop-color:#da8a47"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="64" ry="64" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="60" ry="60" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>

  <!-- Outer gear (large, subtle) -->
  <g transform="translate(256,232)" opacity="0.15">
    <circle r="155" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <!-- Gear teeth -->
    <g fill="url(#gold)">
      <rect x="-12" y="-168" width="24" height="30" rx="4"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(30)"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(60)"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(90)"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(120)"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(150)"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(180)"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(210)"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(240)"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(270)"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(300)"/>
      <rect x="-12" y="-168" width="24" height="30" rx="4" transform="rotate(330)"/>
    </g>
  </g>

  <!-- Corporation building / pillars motif -->
  <g transform="translate(256,220)">
    <!-- Central pillar / tower -->
    <rect x="-20" y="-80" width="40" height="130" rx="4" fill="url(#gold)" opacity="0.9"/>
    <!-- Left pillar -->
    <rect x="-65" y="-50" width="30" height="100" rx="4" fill="url(#gold)" opacity="0.7"/>
    <!-- Right pillar -->
    <rect x="35" y="-50" width="30" height="100" rx="4" fill="url(#gold)" opacity="0.7"/>
    <!-- Outer left pillar -->
    <rect x="-100" y="-25" width="22" height="75" rx="3" fill="url(#gold)" opacity="0.5"/>
    <!-- Outer right pillar -->
    <rect x="78" y="-25" width="22" height="75" rx="3" fill="url(#gold)" opacity="0.5"/>

    <!-- Triangular pediment / roof -->
    <polygon points="-115,-25 0,-95 115,-25" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- Base line -->
    <line x1="-115" y1="52" x2="115" y2="52" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- AI "eye" / node in center -->
    <circle cx="0" cy="-10" r="18" fill="none" stroke="url(#copper)" stroke-width="3"/>
    <circle cx="0" cy="-10" r="8" fill="url(#copper)"/>
    <!-- Connection lines from eye -->
    <line x1="-16" y1="-10" x2="-50" y2="-10" stroke="url(#copper)" stroke-width="1.5" opacity="0.6"/>
    <line x1="16" y1="-10" x2="50" y2="-10" stroke="url(#copper)" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="8" x2="0" y2="35" stroke="url(#copper)" stroke-width="1.5" opacity="0.6"/>
    <!-- Small nodes at connection endpoints -->
    <circle cx="-50" cy="-10" r="3" fill="url(#copper)" opacity="0.6"/>
    <circle cx="50" cy="-10" r="3" fill="url(#copper)" opacity="0.6"/>
    <circle cx="0" cy="35" r="3" fill="url(#copper)" opacity="0.6"/>
  </g>

  <!-- Text: CLAUDE CORP -->
  <text x="256" y="360" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="52" font-weight="bold" letter-spacing="8" fill="url(#gold)">CLAUDE</text>
  <text x="256" y="405" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="32" letter-spacing="14" fill="url(#copper)">CORP</text>

  <!-- Tagline -->
  <text x="256" y="440" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="4" fill="#d4a853" opacity="0.5">YOUR PERSONAL CORPORATION</text>
</svg>