<html>
<head>
<meta charset="utf-8">
<title>Claude Corp</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  canvas { image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const lines = [
  "      \u2584\u2584                \u2584\u2584                                 ",
  "      \u2588\u2588                \u2588\u2588                                 ",
  "\u2584\u2588\u2588\u2588\u2588 \u2588\u2588  \u2580\u2580\u2588\u2584 \u2588\u2588 \u2588\u2588 \u2584\u2588\u2588\u2588\u2588 \u2584\u2588\u2580\u2588\u2584   \u2584\u2588\u2588\u2588\u2588 \u2584\u2588\u2588\u2588\u2584 \u2588\u2588\u2588\u2588\u2584 \u2588\u2588\u2588\u2588\u2584",
  "\u2588\u2588    \u2588\u2588 \u2584\u2588\u2580\u2588\u2588 \u2588\u2588 \u2588\u2588 \u2588\u2588 \u2588\u2588 \u2588\u2588\u2584\u2588\u2580   \u2588\u2588    \u2588\u2588 \u2588\u2588 \u2588\u2588 \u2580\u2580 \u2588\u2588 \u2588\u2588",
  "\u2580\u2588\u2588\u2588\u2588 \u2588\u2588 \u2580\u2588\u2584\u2588\u2588 \u2580\u2588\u2588\u2580\u2588 \u2580\u2588\u2588\u2588\u2588 \u2580\u2588\u2584\u2584\u2584   \u2580\u2588\u2588\u2588\u2588 \u2580\u2588\u2588\u2588\u2580 \u2588\u2588    \u2588\u2588\u2588\u2588\u2580",
  "                                                     \u2588\u2588    ",
  "                                                     \u2580\u2580    "
];

const CELL = 8;
const cols = Math.max(...lines.map(l => l.length));
const rows = lines.length;
const canvas = document.getElementById('c');
const W = cols * CELL;
const H = rows * CELL * 2;
canvas.width = W;
canvas.height = H;

const ctx = canvas.getContext('2d');
ctx.fillStyle = '#0a0a0a';
ctx.fillRect(0, 0, W, H);

for (let r = 0; r < rows; r++) {
  const line = lines[r];
  for (let c = 0; c < line.length; c++) {
    const ch = line[c];
    const x = c * CELL;
    const yTop = r * CELL * 2;
    const yBot = yTop + CELL;
    let fillTop = false, fillBot = false;
    if (ch === '\u2588') { fillTop = true; fillBot = true; }
    else if (ch === '\u2584') { fillBot = true; }
    else if (ch === '\u2580') { fillTop = true; }
    ctx.fillStyle = '#fa8072';
    if (fillTop) ctx.fillRect(x, yTop, CELL, CELL);
    if (fillBot) ctx.fillRect(x, yBot, CELL, CELL);
  }
}
</script>
</body>
</html>
